<div class="profile-page">

  <!-- HEADER -->
  <div class="profile-header">

    <div class="avatar">
      {{ getInitial() }}
    </div>

    <div class="user-info">
      <h2>{{ user.username }}</h2>
      <p>{{ user.email }}</p>
    </div>

  </div>

  <!-- INFO CARDS -->
  <div class="profile-cards">

    <div class="card">
      <h3>Account Info</h3>
      <p><strong>Name:</strong> {{ user.username }}</p>
      <p><strong>Email:</strong> {{ user.email }}</p>
    </div>

    <div class="card">
      <h3>Stats</h3>
      <p><strong>Bookings:</strong> {{ bookings.length }}</p>
      <p><strong>Status:</strong> Active</p>
    </div>

  </div>

  <!-- BOOKINGS -->
  <div class="bookings">
    <h2>My Bookings</h2>

    <div class="booking-card" *ngFor="let b of bookings">

      <img [src]="b.tour_image" alt="tour" class="booking-img">

      <div class="left">
        <h4>{{ b.tour_title }}</h4>
        <p>{{ b.date }}</p>
        <span class="price">${{ b.tour_price }}</span>
      </div>

      <div class="right" [class.confirmed]="b.status === 'confirmed'">
        {{ b.status }}
      </div>

    </div>
  </div>
