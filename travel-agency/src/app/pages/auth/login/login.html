<div class="login-page">

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="overlay">
      <h1>Welcome Back!</h1>
      <p>Sign in to access your bookings and discover amazing destinations</p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <div class="form-box">
      <div class="logo">✈️ Pack&Go</div>

      <h2>Sign In</h2>
      <p class="subtitle">Enter your credentials to access your account</p>

      <!-- Email -->
      <label>Email Address</label>
      <input [(ngModel)]="email" placeholder="your.email@example.com" />

      <!-- Password -->
      <label>Password</label>
      <input [(ngModel)]="password" type="password" placeholder="Enter your password" />

      <!-- Options -->
      <div class="options">
        <label>
          <input type="checkbox" [(ngModel)]="remember" />
          Remember me
        </label>

        <a href="#">Forgot password?</a>
      </div>

      <!-- Error -->
      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <!-- Button -->
      <button (click)="onLogin()" [disabled]="loading">
        {{ loading ? 'Loading...' : 'Sign In' }}
      </button>

      <!-- Register -->
      <p class="register">
        Don't have an account?
        <a routerLink="/register">Create Account</a>
      </p>

      <div class="divider">Or continue with</div>

      <div class="socials">
        <button class="google">Google</button>
        <button class="facebook">Facebook</button>
      </div>

    </div>

  </div>
</div>
