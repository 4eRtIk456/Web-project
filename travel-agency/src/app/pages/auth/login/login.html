<div class="login">

  <!-- LEFT -->
  <div class="left">
    <div class="overlay">
      <h1>Welcome Back!</h1>
      <p>Sign in to access your bookings and discover amazing destinations</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="card">

      <!-- LOGO -->
      <a class="logo">
        <div class="logo">
          <img src="assets/logo.png" alt="logo">
          <span>Pack&Go</span>
        </div>
      </a>

      <h2>Sign In</h2>
      <p class="subtitle">Enter your credentials to access your account</p>

      <form (ngSubmit)="onLogin()">

        <!-- EMAIL -->
        <div class="input">
          <span class="icon">📧</span>
          <input
            type="email"
            placeholder="your.email@example.com"
            [(ngModel)]="email"
            name="email"
            required
          >
        </div>

        <!-- PASSWORD -->
        <div class="input">
          <span class="icon">🔒</span>
          <input
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            required
          >
        </div>

        <!-- OPTIONS -->
        <div class="options">
          <label class="remember">
            <input
              type="checkbox"
              [(ngModel)]="remember"
              name="rememberMe"
            >
            Remember me
          </label>

          <a href="#">Forgot password?</a>
        </div>

      <!-- Button -->
      <button (click)="onLogin()" [disabled]="loading" class="btn">
        {{ loading ? 'Loading...' : '➜ Sign In' }}
      </button>

      <p class="register">
        Don't have an account?
        <a routerLink="/register">Create Account</a>
      </p>
