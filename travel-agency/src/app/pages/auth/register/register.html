<div class="register-page">
  <!-- LEFT SIDE -->
  <div class="left">
    <div class="overlay">
      <h1>Start Your Journey!</h1>
      <p>
        Create an account and explore the world with exclusive deals and
        personalized experiences
      </p>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="form-container">

      <!-- LOGO -->
      <div class="logo">
          <img src="assets/logo.png" alt="logo">
          <span>Pack&Go</span>
      </div>

      <h2>Create Account</h2>
      <p class="subtitle">Join thousands of happy travelers</p>

      <form (ngSubmit)="onRegister()">

        <!-- FULL NAME -->
        <div class="input-group">
          <label>Full Name</label>
          <div class="input">
            <i class="icon">👤</i>
            <input type="text" placeholder="Your full name" [(ngModel)]="name" name="name" />
          </div>
        </div>

        <!-- EMAIL -->
        <div class="input-group">
          <label>Email Address</label>
          <div class="input">
            <i class="icon">✉️</i>
            <input type="email" placeholder="your.email@example.com" [(ngModel)]="email" name="email" />
          </div>
        </div>

        <!-- PHONE -->
        <div class="input-group">
          <label>Phone Number</label>
          <div class="input">
            <i class="icon">📞</i>
            <input type="text" placeholder="+7 (777) 123-45-67" [(ngModel)]="phone" name="phone" />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
          <label>Password</label>
          <div class="input">
            <i class="icon">🔒</i>
            <input type="password" placeholder="Create a strong password" [(ngModel)]="password" name="password" />
          </div>
        </div>

        <!-- CONFIRM -->
        <div class="input-group">
          <label>Confirm Password</label>
          <div class="input">
            <i class="icon">🔒</i>
            <input type="password" placeholder="Confirm your password" [(ngModel)]="confirmPassword" name="confirmPassword" />
          </div>
        </div>

        <!-- CHECKBOX -->
        <div class="checkbox">
          <input type="checkbox" [(ngModel)]="agree" name="agree" />
          <span>
            I agree to the
            <a href="#">Terms of Service</a>
            and
            <a href="#">Privacy Policy</a>
          </span>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn">
          ➕ Create Account
        </button>

      </form>

      <!-- LINK -->
      <p class="login-link">
        Already have an account?
        <a routerLink="/login">Sign In</a>
      </p>

    </div>
  </div>
</div>
