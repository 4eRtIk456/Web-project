name: Trigger auto deployment for pack-and-go

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/pack-and-go-AutoDeployTrigger-c0eeb170-10bf-4ff0-99b1-56a710427c1b.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PACKANDGO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PACKANDGO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PACKANDGO_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          push: true
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: packandgo.azurecr.io
          registryUsername: ${{ secrets.PACKANDGO_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PACKANDGO_REGISTRY_PASSWORD }}
          containerAppName: pack-and-go
          resourceGroup: web-dev
          imageToBuild: packandgo.azurecr.io/pack-and-go:${{ github.sha }}


